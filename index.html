        function checkPassword(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            const correctHash = 'a71801591284119fdf933608d4b01f6bd8bc7b779396613fb7debc930ce4c115';
            
            // Hash the entered password
            async function hashPassword(pwd) {
                const msgBuffer = new TextEncoder().encode(pwd);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }
            
            hashPassword(password).then(hash => {
                if (hash === correctHash) {
                    // Store auth in sessionStorage (clears when browser closes)
                    sessionStorage.setItem('dashboardAuth', 'true');
                    loadDashboard();
                } else {
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('password').value = '';
                }
            });
        }

            const tabsContainer = document.getElementById('monthTabs');
            tabsContainer.innerHTML = '';
            
            months.forEach(month => {
                if (allData[month] && allData[month].length > 0) {
                    const btn = document.createElement('button');
                    btn.className = `month-btn ${month === currentMonth ? 'active' : ''}`;
                    btn.textContent = month;
                    btn.onclick = () => switchMonth(month);
                    tabsContainer.appendChild(btn);
                }
            });
        }

        function selectCurrentMonth() {
            for (let month of ['JUNE 26', 'MAY 26', 'APRIL 26']) {
                if (allData[month] && allData[month].length > 0) {
                    currentMonth = month;
                    return;
                }
            }
            for (let month of months) {
                if (allData[month] && allData[month].length > 0) {
                    currentMonth = month;
                    return;
                }
            }

            setupMonthTabs();
            updateDashboard();

                if (btn.textContent === currentMonth) {
                    btn.classList.add('active');
                }
            });

            updateStats(monthData);
            updateBrandTable(monthData);
            updateStatusBreakdown(monthData);
        }

        function updateStats(data) {
            let totalBrands = 0;
            let totalRevenue = 0;
            let monthRevenue = 0;
            
            for (let month in allData) {
                totalBrands += allData[month].length;
                allData[month].forEach(item => {
                    try {
                        const rate = parseFloat(item.payRate.replace(/[\$,]/g, '')) || 0;
                        totalRevenue += rate;
                    } catch (e) {}
                });
            }
            
            data.forEach(item => {
                try {
                    const rate = parseFloat(item.payRate.replace(/[\$,]/g, '')) || 0;
                    monthRevenue += rate;
                } catch (e) {}
            });
            
            document.getElementById('totalBrands').textContent = totalBrands;
            document.getElementById('monthRevenue').textContent = `$${monthRevenue.toLocaleString()}`;
            document.getElementById('totalRevenue').textContent = `$${totalRevenue.toLocaleString()}`;

                else other++;
            });

            document.getElementById('statusDraft').textContent = draft;
            document.getElementById('statusOther').textContent = other;
        }
